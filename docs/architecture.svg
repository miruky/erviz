<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 250" role="img" aria-label="ervizの処理の流れ">
  <title>ervizの処理の流れ: DDL入力からSVG出力まで</title>
  <style>
    svg {
      --ink: #28323a;
      --muted: #6b7680;
      --panel: #ffffff;
      --frame: #c3ccd4;
      --accent: #0e7f74;
      font-family: ui-sans-serif, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      svg {
        --ink: #dde3e8;
        --muted: #95a1ab;
        --panel: #20262b;
        --frame: #3a444c;
        --accent: #4fb8a8;
      }
    }
    .box { fill: var(--panel); stroke: var(--frame); stroke-width: 1.5; }
    .stage { fill: var(--ink); font-size: 15px; font-weight: 700; }
    .file { fill: var(--accent); font-size: 12px; }
    .note { fill: var(--muted); font-size: 12px; }
    .arrow { stroke: var(--muted); stroke-width: 1.5; fill: none; }
    .head { fill: var(--muted); }
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path class="head" d="M0 0L8 4L0 8z"/>
    </marker>
  </defs>

  <rect class="box" x="24" y="86" width="150" height="78" rx="10"/>
  <text class="stage" x="99" y="118" text-anchor="middle">DDL入力</text>
  <text class="note" x="99" y="140" text-anchor="middle">CREATE / ALTER</text>

  <rect class="box" x="238" y="86" width="170" height="78" rx="10"/>
  <text class="stage" x="323" y="112" text-anchor="middle">字句解析と解釈</text>
  <text class="file" x="323" y="132" text-anchor="middle">parse.ts</text>
  <text class="note" x="323" y="150" text-anchor="middle">読めない文は警告へ</text>

  <rect class="box" x="472" y="86" width="170" height="78" rx="10"/>
  <text class="stage" x="557" y="112" text-anchor="middle">層状レイアウト</text>
  <text class="file" x="557" y="132" text-anchor="middle">layout.ts</text>
  <text class="note" x="557" y="150" text-anchor="middle">参照される側を左へ</text>

  <rect class="box" x="706" y="86" width="170" height="78" rx="10"/>
  <text class="stage" x="791" y="112" text-anchor="middle">SVG生成</text>
  <text class="file" x="791" y="132" text-anchor="middle">render.ts</text>
  <text class="note" x="791" y="150" text-anchor="middle">クロウズフット記法</text>

  <path class="arrow" d="M174 125h56" marker-end="url(#ar)"/>
  <path class="arrow" d="M408 125h56" marker-end="url(#ar)"/>
  <path class="arrow" d="M642 125h56" marker-end="url(#ar)"/>

  <text class="note" x="436" y="112" text-anchor="middle">Schema</text>
  <text class="note" x="674" y="112" text-anchor="middle">Layout</text>

  <path class="arrow" d="M791 86v-36h-200" marker-end="url(#ar)"/>
  <text class="note" x="690" y="40" text-anchor="middle">プレビュー(パン・ズーム)</text>
  <path class="arrow" d="M791 164v36h-200" marker-end="url(#ar)"/>
  <text class="note" x="688" y="220" text-anchor="middle">単体配布できるSVGファイル</text>
</svg>
